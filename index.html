<!DOCTYPE html>
<html lang="de">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bestell App</title>
    <link rel="shortcut icon" href="./assets/icons/Logo 01.svg" type="image/x-icon">

    <link rel="stylesheet" href="./src/styles/fonts.css">
    <link rel="stylesheet" href="./src/styles/standart.css">
    <link rel="stylesheet" href="./src/styles/style.css">
    <link rel="stylesheet" href="./src/styles/header.css">
    <link rel="stylesheet" href="./src/styles/responsive.css">

    <script src="./src/scripts/script.js"></script>
    <script src="./src/scripts/templates.js"></script>
    <script src="./src/scripts/db.js"></script>
</head>

<body onload="init()">
    <header>
        <nav class="innerWidth">
            <img class="headerLogo" src="./assets/icons/Logo 02.svg" alt="logo_img">
            <button><img class="headerBurgerMenu" src="./assets/icons/burger_menu_icon.svg"
                    alt="burger_menu_icon"></button>
        </nav>
    </header>

    <main>
        <header class="restaurantInfo innerWidth">
            <div class="heroFrame">
                <img class="hero" src="./assets/imgs/burger_house_hero.png" alt="restaurant_info_background_img">
            </div>
            <img class="restaurantLogo" src="./assets/icons/burger_house_logo.png" alt="burger_house_logo_img">
            <div class="restaurantTitle">
                <h1><span class="titleHighlight">Burger</span> House</h1>
                <h2>The best of Burgers, Pizza, and Greens, all in one great place.</h2>
            </div>
        </header>

        <div class="stickyWrapper innerWidth">
            <section id="dishCategory" class="dishCategory">

            </section>


            <section class="basket">
                <header>
                    <h2>Your basket</h2>
                </header>

                <div class="basketWrapper">
                    <section id="addedDishes"class="addedDishWrapper">
                        
                    </section>

                    <footer class="priceWrapper">
                        <div class="subtitleRow">
                            <p>Subtotal</p>
                            <p id="subtotal">0,00€</p>
                        </div>
                        <div class="deliveryFeeRow">
                            <p>Delivery Fee</p>
                            <p id="deliveryFee">0,00€</p>
                        </div>
                        <div class="summaryLine"></div>
                        <div class="totalRow">
                            <p>Total</p>
                            <p id="total">0,00€</p>
                        </div>
                        <button class="buyNowBtn">Buy Now</button>
                    </footer>
                </div>
            </section>

        </div>

    </main>

    <footer class="pageFooter">
        <a href="#"><img src="./assets/icons/copyright.svg" alt="copyright_icon"> 2025 BurgerHouse</a>
        <a href="#">Imprint</a>
        <a href="#">Coocie Preferences</a>
    </footer>
</body>

</html>
